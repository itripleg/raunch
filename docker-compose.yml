services:
  raunch:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persist saves (SQLite DB + world state JSON)
      - ./saves:/app/saves
      - ./characters:/app/characters
      - ./scenarios:/app/scenarios
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
