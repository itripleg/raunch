# Netlify configuration for Raunch frontend
# A Motherhaven Joint

[build]
  # Build from frontend directory
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Environment variables (set these in Netlify dashboard for production)
# VITE_WS_URL = "wss://your-backend.example.com"
# VITE_API_URL = "https://your-backend.example.com"

# SPA routing - redirect all paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
