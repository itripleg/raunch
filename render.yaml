# Render Blueprint for Raunch game server
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: raunch-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn raunch.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: CLAUDE_CODE_OAUTH_TOKEN
        sync: false  # Set manually in dashboard (1-year OAuth token)
      - key: HOSTED_SCENARIO
        value: milk_money  # Auto-start this scenario on boot
    healthCheckPath: /health
    autoDeploy: true
