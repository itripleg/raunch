# Render Blueprint for Raunch game server
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: raunch-game
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from raunch.main import cli; cli()" start --scenario milk_money --headless
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: CLAUDE_CODE_OAUTH_TOKEN
        sync: false  # Set manually in dashboard (1-year OAuth token)
    # No healthCheckPath - WebSocket server doesn't respond to HTTP
    autoDeploy: true
