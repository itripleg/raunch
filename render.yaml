# Render Blueprint for Raunch game server
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: raunch-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn raunch.server.app:create_app --factory --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DB_BACKEND
        value: firestore  # Use Firestore for persistence across deploys
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false  # Set manually in dashboard (Firebase service account JSON)
      - key: CLAUDE_CODE_OAUTH_TOKEN
        sync: false  # Set manually in dashboard (1-year OAuth token)
      - key: HOSTED_SCENARIO
        value: milk_money  # Auto-start this scenario on boot
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: raunch-frontend
    runtime: static
    buildCommand: cd frontend && yarn install && yarn build
    staticPublishPath: ./frontend/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://raunch.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
